# 优化建议规则配置
# Optimization Rules Configuration

# 标题优化规则
headline_rules:
  # 标题长度（字数）
  max_length: 20        # 最大长度
  ideal_length: 12      # 理想长度
  min_length: 5         # 最小长度

  # 标题字号（pt）
  min_font_size: 14     # 最小字号
  max_font_size: 24     # 最大字号
  ideal_font_size: 18   # 理想字号

  # 标题位置
  should_center: false  # 是否应该居中
  top_margin: 10        # 顶部边距（pt）

# 版面平衡规则
layout_rules:
  # 左右平衡
  left_right_ratio:
    min: 0.83   # 5:6
    max: 1.2    # 6:5
    ideal: 1.0  # 1:1

  # 上下平衡
  top_bottom_ratio:
    min: 0.8
    max: 1.25
    ideal: 1.0

  # 重心位置
  center_of_gravity:
    x_min: 0.45   # 页面宽度的45%-55%
    x_max: 0.55
    y_min: 0.45   # 页面高度的45%-55%
    y_max: 0.55

# 视觉层次规则
visual_rules:
  # 字号层次
  font_size_ratios:
    headline_to_body:
      min: 1.5
      max: 2.5
      ideal: 2.0

    subheadline_to_body:
      min: 1.2
      max: 1.5
      ideal: 1.3

  # 字体使用
  font_families:
    max_different: 3  # 最多使用几种字体
    should_consistent: true  # 同级内容应使用相同字体

# 可读性规则
readability_rules:
  # 分栏
  columns:
    min_width: 20     # 最小栏宽（pt）
    max_width: 35     # 最大栏宽（pt）
    ideal_width: 25   # 理想栏宽（pt）

  # 正文长度
  body_length:
    min_chars: 200    # 最小字符数
    max_chars: 1500   # 最大字符数
    ideal_chars: 800  # 理想字符数

  # 段落
  paragraph:
    min_length: 50    # 最小段落长度（字符）
    max_length: 300   # 最大段落长度（字符）
    ideal_length: 150 # 理想段落长度（字符）

# 留白规则
white_space_rules:
  # 边距
  margins:
    top: 15
    bottom: 15
    left: 10
    right: 10

  # 元素间距
  spacing:
    between_articles: 8
    between_headline_body: 3
    between_columns: 4

# 图文搭配规则
image_rules:
  # 图片位置
  position:
    should_near_related_text: true
    max_distance_from_text: 50

  # 图片大小
  size:
    min_width: 100
    max_width: 400
    ideal_width: 250

# 优先级权重
priority_weights:
  high:
    score_impact: 5
    visual_impact: 5

  medium:
    score_impact: 2
    visual_impact: 2

  low:
    score_impact: 1
    visual_impact: 1
