# 决策策略配置
# Decision Strategy Configuration

# 可用的决策策略
strategies:
  # 保守策略：宁可误拒，不可漏报
  conservative:
    name: "保守策略"
    description: "宁可误拒，不可漏报"
    thresholds:
      approve:
        max_critical: 0
        max_high: 0
        max_medium: 1
      review:
        max_critical: 0
        max_high: 1
        max_medium: 3
      reject:
        # 超过review阈值的所有情况
        pass
    reasoning_templates:
      approve: "风险极低，可以付印"
      review: "发现{high_count}个高风险，建议重点审查"
      reject: "发现{critical_count}个重大风险，建议修改后重新提交"

  # 平衡策略：在准确率和召回率之间平衡（默认）
  balanced:
    name: "平衡策略"
    description: "在准确率和召回率之间平衡"
    thresholds:
      approve:
        max_critical: 0
        max_high: 1
        max_medium: 3
      review:
        max_critical: 0
        max_high: 2
        max_medium: 5
      reject:
        # 超过review阈值的所有情况
        pass
    reasoning_templates:
      approve: "整体质量良好，可以付印"
      review: "发现{high_count}个高风险和{medium_count}个中等风险，建议重点关注"
      reject: "发现重大风险，必须修改后重新提交"

  # 激进策略：宁可漏报，不可误拒
  aggressive:
    name: "激进策略"
    description: "宁可漏报，不可误拒"
    thresholds:
      approve:
        max_critical: 0
        max_high: 2
        max_medium: 5
      review:
        max_critical: 1
        max_high: 3
        max_medium: 8
      reject:
        # 超过review阈值的所有情况
        pass
    reasoning_templates:
      approve: "风险可控，可以付印"
      review: "存在一些问题，建议酌情处理"
      reject: "仅在有重大事故风险时才拒绝"

# 默认策略
default_strategy: balanced

# 风险等级计算规则
risk_level_calculation:
  # CRITICAL: 有任何critical风险
  critical:
    condition: "critical_count > 0"

  # HIGH: 有≥2个high风险 或 ≥5个medium风险
  high:
    condition: "high_count >= 2 or medium_count >= 5"

  # MEDIUM: 有1个high风险 或 2-4个medium风险
  medium:
    condition: "high_count == 1 or (2 <= medium_count <= 4)"

  # LOW: 只有medium/low风险且数量不多
  low:
    condition: "otherwise"

# 置信度计算规则
confidence_calculation:
  # 基础置信度（来自parser_auditor）
  base_confidence:
    high: 0.9
    medium: 0.7
    low: 0.5

  # 风险数量惩罚
  risk_count_penalty: 0.02  # 每个风险扣2%
  max_penalty: 0.2  # 最多扣20%
